{% extends "base.html" %}
{% block title %}Editar Setor{% endblock %}

{% block content %}
<section class="panel">
  <div class="panel-title split">
    <div>
      <h2>Editar setor</h2>
      <p>Altere o setor, cargos, CBOs, número de funcionários e descrições.</p>
    </div>
    <a class="btn ghost" href="{{ url_for('setores') }}">Voltar</a>
  </div>
  <form method="post" class="form-card">
    {% include "_setor_form.html" %}
    <div class="actions end">
      <button class="btn primary" type="submit">Salvar alterações</button>
    </div>
  </form>
</section>
{% endblock %}
