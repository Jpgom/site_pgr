services:
  - type: web
    name: site-sst-pgr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: site-sst-pgr-db
          property: connectionString

databases:
  - name: site-sst-pgr-db
